<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI PRO</title>
  <style>
    body { font-family: Arial; background:#f5f7ff; margin:0; }
    #chat { height:70vh; overflow:auto; padding:10px; }
    .msg { margin:5px; padding:8px; border-radius:8px; }
    .user { background:#cce5ff; text-align:right; }
    .ai { background:#fff; }
    input { width:70%; padding:10px; }
    button { padding:10px; }
  </style>
</head>
<body>

<h2 style="text-align:center;">AI PRO 🚀</h2>

<div id="chat"></div>

<div style="padding:10px;">
  <input id="input" placeholder="Напиши сообщение..." />
  <button onclick="send()">Send</button>
</div>

<div style="padding:10px;">
  <input id="prompt" placeholder="Промпт для картинки..." />
  <button onclick="img()">🎨</button>
</div>

<script>
const chat = document.getElementById("chat");

async function send(){
  const text = input.value;
  if(!text) return;

  chat.innerHTML += `<div class='msg user'>${text}</div>`;
  input.value = "";

  const res = await fetch("/api/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({message:text})
  });

  const data = await res.json();
  chat.innerHTML += `<div class='msg ai'>${data.reply}</div>`;
}

async function img(){
  const res = await fetch("/api/image", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({prompt:prompt.value})
  });

  const data = await res.json();
  chat.innerHTML += `<div class='msg ai'><img src="${data.url}" style="max-width:100%"></div>`;
}
</script>

</body>
</html>

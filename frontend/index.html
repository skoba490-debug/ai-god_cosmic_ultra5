<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Ultra PRO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <h2>AI Ultra</h2>
      <button onclick="newChat()">➕ Новый чат</button>
      <button onclick="toggleVoice()">🎤 Voice</button>
    </div>

    <!-- Main -->
    <div class="main">
      <div id="chat" class="chat"></div>
      <div class="input-area">
        <input id="input" placeholder="Напиши сообщение..." />
        <button onclick="send()">➤</button>
      </div>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
